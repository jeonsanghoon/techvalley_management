services:
  documentdb:
    image: mongo:7
    ports: ["27000:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: tv
      MONGO_INITDB_ROOT_PASSWORD: tv_local_dev
    volumes:
      - tv-docdb:/data/db

  postgres:
    image: postgres:16
    ports: ["25432:5432"]
    environment:
      POSTGRES_USER: tv
      POSTGRES_PASSWORD: tv_local_dev
      POSTGRES_DB: iot_analytics

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["19010:9000", "19011:9001"]
    environment:
      MINIO_ROOT_USER: tv
      MINIO_ROOT_PASSWORD: tv_local_dev

volumes:
  tv-docdb:
