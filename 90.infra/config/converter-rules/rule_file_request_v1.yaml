# file/request — 업로드 세션 시작 (single_put | multipart | image_chunk | video_stream)
rule_id: rule_file_request_v1
rule_code: rule_file_request_v1
rule_version: "1.0.0"
spec_version: "1"
deploy_version: "1.0.0"
description: "event/file/request — S3 업로드 세션 시작"
topic_match:
  - pattern: "tv/{env}/+/+/event/file/request/json"
payload:
  type: json_to_json
  format: { strict: false, max_depth: 24 }
  map:
    - { from: deviceId, to: device_code, target_type: string, required: true }
    - { from: request_code, to: request_code, target_type: string, required: true }
    - { from: file_kind, to: file_kind, target_type: string, required: true }
    - { from: upload_mode, to: upload_mode, target_type: string, required: true }
    - { from: file_size_bytes, to: file_size_bytes, target_type: int64, required: false }
    - { from: part_size_bytes, to: part_size_bytes, target_type: int64, required: false }
    - { from: total_parts, to: total_parts, target_type: int32, required: false }
    - { from: total_chunks, to: total_chunks, target_type: int32, required: false }
    - { from: codec, to: codec, target_type: string, required: false }
    - { from: device_timestamp, to: device_timestamp, target_type: int64, required: true }
    - { from: data_index, to: data_index, target_type: int32, required: false, default: 0 }
    - { from: checksum_sha256, to: checksum_sha256, target_type: string, required: false }
    - { from: file_transfer_status, to: file_transfer_status, target_type: string, required: false, default: PENDING }
  target:
    document_model: flat_json
targets:
  - collection: files_history
    unique_key: [device_code, request_code, device_timestamp, data_index]
    on_duplicate: skip
