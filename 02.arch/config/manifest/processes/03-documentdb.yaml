        created_at: -1
      options:
        name: idx_event_history_domain_device_created_desc
    - keys:
        event_domain: 1
        device_code: 1
        device_timestamp: 1
        data_index: 1
      options:
        name: uk_event_history_idem
        unique: true
  - name: control_history
    indexes:
    - keys:
        device_code: 1
        created_at: -1
      options:
        name: idx_control_history_device_created_desc
    - keys:
        request_code: 1
      options:
        name: idx_control_history_request_code
    - keys:
        device_code: 1
        request_code: 1
        created_at: -1
      options:
        name: idx_control_history_device_request_created_desc
    - keys:
        device_code: 1
        device_timestamp: 1
        data_index: 1
      options:
        name: uk_control_history_idem
