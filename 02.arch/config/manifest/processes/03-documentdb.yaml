documentdb:
  ingress_indexes_ssot: iot_kds_lambda_pipeline.integrated_ingress_schema_contract.routes[].documentdb.indexes
  derives_from: iot_kds_lambda_pipeline.iot_rules.rules[].downstream.collection
  database: iot_service
  spec_reference: 02.arch/config/schema/documentdb/collection-contract.md
  rdbms_time_series_link:
    version: 1
    loader: 03.source/lambda/packages/pipeline-core/rdbms-time-series-link.mjs
    documentdb:
      default_source_collections:
      - periodic_telemetry
      - device_notifications
    links:
    - id: device_code
      documentdb:
        field: device_code
        type: string
        required: true
      postgres:
      - table: device
        column: device_code
        usage: master_lookup
      - table: communication_quality_rollup
        column: device_code
        usage: trace_snapshot
      - table: communication_alarm_incident
        column: device_code
        usage: trace_snapshot
    - id: rds_device_pk_fk
      documentdb:
        field: device_code
      postgres:
      - table: device
        column: id
        usage: master_pk
      - table: communication_alarm_incident
        column: device_id
        usage: fk_optional_from_device_code
      - table: communication_alarm_incident
        column: device_code
        usage: trace_snapshot
      - table: notification
        column: device_id
        usage: fk_optional_from_device_code
      resolve:
        type: master_lookup
        master_table: device
        master_pk_column: id
        lookup_column: device_code
        source_link_id: device_code
    - id: event_time_ms
      documentdb:
        field: device_timestamp
        type: int64
        semantic: utc_epoch_ms
      postgres:
      - table: communication_quality_rollup
        column: source_window_start_ms
        bound: window_start
      - table: communication_quality_rollup
        column: source_window_end_ms
        bound: window_end
      - table: communication_quality_rollup_site
        column: source_window_start_ms
        bound: window_start
      - table: communication_quality_rollup_site
        column: source_window_end_ms
        bound: window_end
    - id: ingest_bucket_10m
      documentdb:
        field: base_time
        type: int64
        format: yyyyMMddHHmm
      postgres:
      - table: communication_quality_rollup
        column: source_created_10min_min
        bound: bucket_min
      - table: communication_quality_rollup
        column: source_created_10min_max
        bound: bucket_max
      - table: communication_quality_rollup_site
        column: source_created_10min_min
        bound: bucket_min
      - table: communication_quality_rollup_site
        column: source_created_10min_max
        bound: bucket_max
    - id: server_persist_time
      documentdb:
        field: created_at
        type: string
        format: iso8601_utc
      analytics_lake:
        column: created_at
      postgres: []
    - id: doc_idempotency_key
      documentdb:
        composite_fields:
        - device_code
        - device_timestamp
        - data_index
        alt_field: _id
      postgres:
      - table: communication_quality_rollup
        column: source_event_keys
        usage: jsonb_array
      - table: communication_quality_rollup
        column: source_event_count
        usage: aggregate_count
    org_resolution:
    - id: site_id
      resolve:
        type: master_join
        master_table: device
        master_column: site_id
        lookup_column: device_code
        source_link_id: device_code
    - id: product_id
      resolve:
        type: master_join
        master_table: device
        master_column: product_id
        lookup_column: device_code
        source_link_id: device_code
  rollup_hierarchy:
    time_bucket_fields:
    - base_time
    - base_hour
    - base_day
    - base_month
    - base_year
    time_bucket_format: YYYYMMDDhh 또는 그레인별 YYYYMMDD / YYYYMM / YYYY
  collections:
  - name: periodic_telemetry
    indexes:
    - keys:
        device_code: 1
        created_at: -1
      options:
        name: idx_device_code_created_at_desc
    - keys:
        base_time: 1
        created_at: -1
      options:
        name: idx_base_time_created_at_desc
    - keys:
        device_code: 1
        device_timestamp: 1
        data_index: 1
      options:
        name: uk_device_code_device_timestamp_data_index
        unique: true
    - keys:
        base_hour: 1
        created_at: -1
      options:
        name: idx_base_hour_created_at_desc
  - name: rollup_cursor_periodic_telemetry
    indexes:
    - keys:
        device_code: 1
      options:
        name: uk_rollup_cursor_device_code
        unique: true
  - name: device_meta
    indexes:
    - keys:
        deviceId: 1
        createdAt: -1
      options:
        name: idx_deviceId_createdAt_desc
    - keys:
        deviceId: 1
        type: 1
      options:
        name: idx_deviceId_type
  - name: device_notifications
    indexes:
    - keys:
        device_code: 1
        created_at: -1
      options:
        name: idx_device_code_created_at_desc
    - keys:
        device_code: 1
        alert_code: 1
        created_at: -1
      options:
        name: idx_device_alert_created_desc
  - name: event_history
    indexes:
