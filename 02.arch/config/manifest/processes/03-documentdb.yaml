        device_code: 1
        created_at: -1
      options:
        name: idx_fota_history_device_created_desc
    - keys:
        request_code: 1
      options:
        name: idx_fota_history_request_code
    - keys:
        device_code: 1
        request_code: 1
        created_at: -1
      options:
        name: idx_fota_history_device_request_created_desc
    - keys:
        device_code: 1
        device_timestamp: 1
        data_index: 1
      options:
        name: uk_fota_history_idem
