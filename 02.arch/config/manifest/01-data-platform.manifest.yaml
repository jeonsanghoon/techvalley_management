stream_ingress:
  normalize_config_path: 02.arch/config/normalize-config.default.yaml
  analytics_lake:
    enabled: true
    lake_config_ref: 02.arch/config/schema/iceberg/lake-config.yaml
    flow: firehose_to_s3_then_glue_to_iceberg
    firehose:
      enabled: true
      stream_env: FIREHOSE_STREAM_NAME
    iceberg:
      catalog: glue
      default_table_id: stream_fact_telemetry
      partition_time_source:
        column: created_at
        link: documentdb.rdbms_time_series_link.links[id=server_persist_time]
      tables_ref: 02.arch/config/schema/iceberg/tables.yaml
  topic_routing_policy:
    periodic_default_path: firehose_to_s3_glue_iceberg_only
    kds_used_doc_and_firehose:
      - periodic/telemetry/report
      - event/telemetry/status
      - event/alarm
      - event/control
      - event/fota
      - event/file
batch_config_ref: 02.arch/config/02-batch-cadence.yaml
alarm_notification_contract:
  version: 1
  execution_yaml_ref: 02.arch/config/02-batch-cadence.yaml
  sensor_data_conversion:
    normalize_config_path_ref: 02.arch/config/normalize-config.default.yaml
    payload_rule_bundle:
      location_hint: 02.arch/config/rules/*.json
  batch_alarm:
    backend:
      service: batch_cadence_runner
      scheduler: eventbridge
    critical_sla_minutes: 15
batch_converter_contract:
  deploy_schedules_ref: 02.arch/config/ingress-deploy.yaml#batch.schedules
postgres:
  database: iot_analytics
  ddl_root: 02.arch/config/schema/postgres
  apply_order:
    - 01-core-schema.sql
    - 02-pipeline-alarm-notification.sql
    - 04-tv-domain-extensions.sql
    - 05-seed-dev.sql
  optional_reference:
    - 03-seed-reference.sql
  table_groups:
    core_master:
      - user
      - common_code
      - company
      - branch
      - site
      - product
      - device
    pipeline_alarm:
      - alert
      - notification
      - communication_quality_rollup
      - communication_quality_rollup_site
      - communication_alarm_incident
      - communication_alarm_incident_action
      - notification_ruleset
      - notification_rule
    telemetry_rollup:
      - telemetry_site_product_time_series
      - telemetry_company_product_time_series
    tv_domain:
      - anomaly_events
      - rule_recommendations
      - self_heal_playbooks
      - self_heal_executions
      - model_registry_mirror
      - service_ticket
      - service_ticket_progress
      - sla_fleet_snapshot
      - equipment_log_tube
      - equipment_log_detector
      - equipment_log_body
      - equipment_log_control
      - equipment_log_firmware
      - equipment_log_audit
      - parts_order
      - parts_schedule
      - as_record
      - installation
  ui_mapping:
    equipment: device
    customer: company
    notification_ruleset_mirror: notification_ruleset
