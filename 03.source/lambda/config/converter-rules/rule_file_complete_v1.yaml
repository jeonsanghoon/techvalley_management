# file/complete — CompleteMultipartUpload 또는 single PUT 완료
rule_id: rule_file_complete_v1
rule_code: rule_file_complete_v1
rule_version: "1.0.0"
spec_version: "1"
deploy_version: "1.0.0"
description: "event/file/complete — 업로드 완료"
topic_match:
  - pattern: "tv/{env}/+/+/event/file/complete/json"
payload:
  type: json_to_json
  format: { strict: false, max_depth: 24 }
  map:
    - { from: deviceId, to: device_code, target_type: string, required: true }
    - { from: request_code, to: request_code, target_type: string, required: true }
    - { from: upload_id, to: upload_id, target_type: string, required: false }
    - { from: upload_mode, to: upload_mode, target_type: string, required: false }
    - { from: etag, to: etag, target_type: string, required: false }
    - { from: checksum_sha256, to: checksum_sha256, target_type: string, required: false }
    - { from: parts, to: parts, target_type: json, required: false }
    - { from: s3_bucket, to: s3_bucket, target_type: string, required: false }
    - { from: s3_key, to: s3_key, target_type: string, required: false }
    - { from: device_timestamp, to: device_timestamp, target_type: int64, required: true }
    - { from: file_transfer_status, to: file_transfer_status, target_type: string, required: false, default: COMPLETED }
  target:
    document_model: flat_json
targets:
  - collection: files_history
    unique_key: [device_code, request_code, device_timestamp, data_index]
    on_duplicate: update
